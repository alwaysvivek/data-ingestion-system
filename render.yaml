services:
  - type: web
    name: data-ingestion-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

  - type: web
    name: data-ingestion-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://data-ingestion-backend.onrender.com
      - key: VITE_WS_BASE_URL
        value: wss://data-ingestion-backend.onrender.com
